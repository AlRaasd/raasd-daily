<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تقرير الرصد اليومي</title>
<script>
// Redirect viewer.html → index.html while preserving all query params and hash
(function() {
  var loc = window.location;
  var target = loc.href.replace(/\/viewer\.html/i, '/index.html');
  // If there's no index.html in path, just replace viewer.html with empty
  if (target === loc.href) {
    target = loc.href.replace(/viewer\.html/i, 'index.html');
  }
  window.location.replace(target);
})();
</script>
</head>
<body style="font-family:'Tajawal',sans-serif;background:#F4EFE6;color:#1A1A1A;text-align:center;padding:60px 20px">
<p>جارٍ التحويل...</p>
</body>
</html>
